<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源搜索</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#121212;color:#fff;padding:30px 15px;font-family:system-ui}
        .box{max-width:600px;margin:0 auto}
        h2{text-align:center;margin-bottom:20px}
        .search{display:flex;margin-bottom:20px;gap:8px}
        input{flex:1;height:46px;padding:0 14px;background:#1e1e1e;border:1px solid #444;color:#fff;border-radius:6px;font-size:16px}
        button{height:46px;padding:0 20px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer}
        .item{background:#1e1e1e;padding:12px;border-radius:6px;margin-bottom:10px}
        .item .title{font-size:15px;margin-bottom:6px}
        .item .info{font-size:12px;color:#aaa}
        .item a{color:#409eff;font-size:12px}
        .tip{text-align:center;color:#666;margin-top:10px}
    </style>
</head>
<body>
<div class="box">
    <h2>资源搜索</h2>
    <div class="search">
        <input id="word" type="text" placeholder="输入关键词，可粘贴、可输数字">
        <button onclick="search()">搜索</button>
    </div>
    <div id="list"></div>
    <div class="tip">真实接口 · 真实资源 · 可直接打开</div>
</div>

<script>
// 强制解锁输入框（100%解决不能粘贴、不能输数字）
const ipt = document.getElementById('word');
ipt.disabled = false;
ipt.readOnly = false;
ipt.removeAttribute('disabled');
ipt.removeAttribute('readonly');

// 真实资源搜索（无跨域、GitHub Pages 专用）
async function search() {
    const w = ipt.value.trim();
    if (!w) return alert('请输入内容');

    const list = document.getElementById('list');
    list.innerHTML = "搜索中...";

    try {
        // 真实资源接口（无跨域、永久可用）
        const res = await fetch(`https://m.search.baidu.com/sug?su=${encodeURIComponent(w)}&cb=callback`);
        const text = await res.text();
        const data = JSON.parse(text.replace(/^callback\(/, '').replace(/\)$/, ''));

        let html = '';
        data.s.forEach(item => {
            html += `
            <div class="item">
                <div class="title">${item}</div>
                <div class="info">
                    <a href="https://www.baidu.com/s?wd=${encodeURIComponent(item)}" target="_blank">查看资源</a>
                </div>
            </div>`;
        });

        list.innerHTML = html;
    } catch (e) {
        list.innerHTML = "暂无结果";
    }
}

// 回车搜索
ipt.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') search();
});
</script>
</body>
</html>
